name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Checar tipos
        run: npm run type-check

  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    needs: typecheck
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
      NEXT_PUBLIC_APP_URL: https://placeholder.com
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
      CRON_SECRET: placeholder
      EFI_CLIENT_ID: placeholder
      EFI_CLIENT_SECRET: placeholder
      EFI_WEBHOOK_TOKEN: placeholder
      EVOLUTION_API_URL: https://placeholder.com
      EVOLUTION_API_KEY: placeholder
      EVOLUTION_API_INSTANCE: placeholder
      NEXT_PUBLIC_SENTRY_DSN: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Build
        run: npm run build
